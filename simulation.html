<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cogniflex - Simulation</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script type="module" src="/src/js/main.js"></script>
</head>

<body>

    <div id="main-header"></div>

    <main class="container">
        <!-- Seu conteúdo HTML foi mantido intacto -->
        <div class="progress-container" id="progress-container" style="display: none;">
            <div class="progress-info">
                <span>Session Progress</span>
                <span id="progress-text">Scenario 1 of 5</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill" style="width: 20%;"></div>
            </div>
        </div>

        <section class="simulation-card">
            <div class="situation-header">
                <h2 id="scenario-title">Loading scenario...</h2>
                <p class="situation-text" id="scenario-text">Please wait while we prepare the story.</p>
            </div>

            <div class="simulation-media-placeholder" id="media-container" style="display: none;">
                <img id="scenario-gif" src="" alt="Scenario illustration"
                    style="max-width: 100%; border-radius: 12px; display: none;">
            </div>

            <h3 id="question-prompt" style="display: none;">Choose how you would like to respond:</h3>

            <div class="options-container" id="options-container">
            </div>

            <div id="feedback-container"
                style="display: none; margin-top: 20px; padding: 20px; border-radius: 12px; background: var(--gray-light);">
                <h3 id="feedback-title" style="margin-bottom: 10px;">Consequence</h3>
                <p id="feedback-immediate"><strong>Immediate:</strong> <span></span></p>
                <p id="feedback-later"><strong>Long-term:</strong> <span></span></p>
                <button id="next-scenario-btn" class="btn-primary" style="margin-top: 15px;">Next Scenario</button>
            </div>
        </section>

        <div class="bottom-info-bar">
            <p>💡 <em>Remember: there is not always a single right or wrong answer. Every choice leads to a different
                    consequence!</em></p>
        </div>
    </main>

    <div id="main-footer"></div>

    <script type="module">
        import SimulationManager from '/src/js/SimulationManager.mjs';

        // Removido o event listener do DOMContentLoaded
        const simulation = new SimulationManager();
        simulation.init();
    </script>
</body>

</html>
